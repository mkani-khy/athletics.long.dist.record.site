<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4月の記録まとめ</title>
    <link rel="icon" type="" href="">
    <style>
        body{
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding:20px 10px;
            background-color: #83a9d3;
            text-align: center;
            color: white;
            overscroll-behavior-y: none;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 75px;
            letter-spacing: 0.05em;
        }
        .link-container{
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 15px;
            background-color: rgba(0,0,0,0.4);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        details {
            background-color: #444;
            border-radius: 12px;
            box-shadow: 0 4px 0 #222;
            transition: transform 0.1s, background-color 0.2s;
            overflow: hidden;
        }
        summary {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 55px;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 500;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        details[open] {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #222;
            background-color: #333;
        }
        details p {
            font-size: 0.95rem;
            color: #ddd;        
            margin: 15px 0 10px 0; 
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        details img {
            max-width: 90%;    
            height: auto;
            display: block;
            margin: 0 auto 20px auto; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .back-button {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 450px;
            height: 55px;
            margin: 30px auto 0 auto;
            background-color: #555;  
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 4px 0 #333;
            transition: transform 0.1s, background-color 0.2s;
        }
        .back-button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #333;
            background-color: #444;
        }
    </style>
</head>
<body>
    <h1>2026年4月の記録</h1>
    <div class="link-container">
        <details>
            <summary>2026年4月総計</summary>
            <p> 4月 最終集計データ</p>
            <img src="2604_h.png" alt="4月総計">
        </details>
        <details>
            <summary>第4週(~)</summary>
            <p> 第4週 集計データ</p>
            <img src="26044_h.png" alt="4月5週">
        </details>
        <details>
            <summary>第4週(~)</summary>
            <p> 第4週 集計データ</p>
            <img src="26045_h.png" alt="4月5週">
        </details>
    </div>
    <a href="index.html" class="back-button">← まとめへ戻る</a>
</body>
</html>
